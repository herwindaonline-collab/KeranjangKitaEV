<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KeranjangKita - Aplikasi Belanja Ibu & ART</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime"
      }
    }
  </script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-100 text-gray-800">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from "react";
    import { createRoot } from "react-dom/client";
    
    // Mengimpor Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // KODE FIREBASE ANDA (SUDAH DIMASUKKAN)
    const firebaseConfig = {
      apiKey: "AIzaSyBHum3lY58OWk0R2O12_Y52lKeo1vdh40A",
      authDomain: "keranjangkita-c10b2.firebaseapp.com",
      projectId: "keranjangkita-c10b2",
      storageBucket: "keranjangkita-c10b2.firebasestorage.app",
      messagingSenderId: "946764205167",
      appId: "1:946764205167:web:e5c8926ad7b3e0fe94d19a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Ikon-ikon aplikasi
    const IconShoppingBag = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>);
    const IconPlusCircle = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>);
    const IconClock = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>);
    const IconCheckCircle2 = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>);
    const IconXCircle = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>);
    const IconArchive = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="5" x="2" y="4" rx="1"/><path d="M4 9v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9"/><path d="M10 13h4"/></svg>);
    const IconRefreshCw = ({ className }) => (<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>);

    const CATEGORIES = ['Sembako & Makanan', 'Snack', 'Bumbu Dapur', 'Kebersihan & Cuci', 'Kebutuhan Mandi', 'Perlengkapan Anak/Bayi', 'Lain-lain'];
    const COMMON_ITEMS = ['Beras', 'Minyak Goreng', 'Gula', 'Garam', 'Telur', 'Sabun Mandi', 'Shampo', 'Pasta Gigi', 'Sikat Gigi', 'Deterjen', 'Pewangi Pakaian', 'Sabun Cuci Piring', 'Pembersih Lantai', 'Tisu Toilet', 'Tisu Wajah', 'Air Galon', 'Gas Elpiji', 'Obat Nyamuk', 'Susu'];
    const STATUS = { REQUESTED: 'DIBUTUHKAN', BOUGHT: 'DIBELI', RECEIVED: 'DITERIMA', CANCELLED: 'DIBATALKAN' };
    const MONTHS = [
      { value: '01', label: 'Januari' }, { value: '02', label: 'Februari' }, { value: '03', label: 'Maret' }, { value: '04', label: 'April' },
      { value: '05', label: 'Mei' }, { value: '06', label: 'Juni' }, { value: '07', label: 'Juli' }, { value: '08', label: 'Agustus' },
      { value: '09', label: 'September' }, { value: '10', label: 'Oktober' }, { value: '11', label: 'November' }, { value: '12', label: 'Desember' }
    ];
    
    const currentYear = new Date().getFullYear();
    const YEARS = Array.from({ length: 2050 - currentYear + 1 }, (_, i) => (currentYear + i).toString());

    function App() {
      const [user, setUser] = useState(null);
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [globalError, setGlobalError] = useState(null);
      
      const [role, setRole] = useState('ART'); 
      const [activeTab, setActiveTab] = useState('AKTIF'); 
      
      const [newItemName, setNewItemName] = useState('');
      const [newItemQty, setNewItemQty] = useState('');
      const [newItemCat, setNewItemCat] = useState(CATEGORIES[0]);

      const currentDate = new Date();
      const [selectedMonth, setSelectedMonth] = useState(String(currentDate.getMonth() + 1).padStart(2, '0'));
      const [selectedYear, setSelectedYear] = useState(String(currentDate.getFullYear()));
      
      const viewMonth = `${selectedYear}-${selectedMonth}`;

      useEffect(() => {
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (err) {
            console.error("Auth error:", err);
            setLoading(false);
            let errorMsg = "Gagal masuk ke sistem: " + err.message;
            if (err.code === 'auth/configuration-not-found') {
              errorMsg = "Sistem Authentication belum siap atau API Key Firebase Anda dibatasi. Tunggu 5-10 menit jika Anda baru mengaktifkannya. Pastikan Anda mengizinkan domain (seperti googleusercontent.com) di Firebase > Authentication > Settings > Authorized domains.";
            }
            setGlobalError(errorMsg);
          }
        };
        initAuth();

        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (currentUser) {
            setUser(currentUser);
          }
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        
        const itemsRef = collection(db, 'shopping_items');
        
        const unsubscribe = onSnapshot(itemsRef, (snapshot) => {
          const fetchedItems = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          fetchedItems.sort((a, b) => b.createdAt - a.createdAt);
          setItems(fetchedItems);
          setLoading(false);
        }, (error) => {
          console.error("Firestore error:", error);
          setLoading(false);
          setGlobalError("Gagal memuat data. Pesan error: " + error.message);
        });

        return () => unsubscribe();
      }, [user]);

      const handleAddItem = async (e) => {
        e.preventDefault();
        if (!user || !newItemName.trim() || !newItemQty.trim()) return;

        const newItem = {
          name: newItemName.trim(),
          quantity: newItemQty.trim(),
          category: newItemCat,
          status: STATUS.REQUESTED,
          month: viewMonth,
          createdAt: Date.now(),
        };

        try {
          const docRef = doc(collection(db, 'shopping_items'));
          await setDoc(docRef, newItem);
          setNewItemName('');
          setNewItemQty('');
        } catch (err) {
          setGlobalError("Gagal menambah barang: " + err.message);
        }
      };

      const handleUpdateStatus = async (itemId, newStatus) => {
        if (!user) return;
        try {
          const itemRef = doc(db, 'shopping_items', itemId);
          await updateDoc(itemRef, { status: newStatus });
        } catch (err) {
          console.error("Error updating status:", err);
        }
      };

      const handleMoveToNextMonth = async (item) => {
        if (!user || !item || !item.month) return;
        try {
          const [year, month] = item.month.split('-');
          const nextDate = new Date(parseInt(year, 10), parseInt(month, 10) - 1);
          nextDate.setMonth(nextDate.getMonth() + 1);
          
          const nextMonthStr = `${nextDate.getFullYear()}-${String(nextDate.getMonth() + 1).padStart(2, '0')}`;

          const itemRef = doc(db, 'shopping_items', item.id);
          await updateDoc(itemRef, { month: nextMonthStr });
        } catch (err) {
          console.error("Error moving item:", err);
        }
      };

      const handleDeleteItem = async (itemId) => {
        if (!user) return;
        try {
          const itemRef = doc(db, 'shopping_items', itemId);
          await deleteDoc(itemRef);
        } catch (err) {
          console.error("Error deleting item:", err);
        }
      };

      const activeItems = useMemo(() => items.filter(item => item.month === viewMonth && (item.status === STATUS.REQUESTED || item.status === STATUS.BOUGHT)), [items, viewMonth]);
      const completedItems = useMemo(() => items.filter(item => item.month === viewMonth && (item.status === STATUS.RECEIVED || item.status === STATUS.CANCELLED)), [items, viewMonth]);
      const cutoffPendingItems = useMemo(() => items.filter(item => item.month <= viewMonth && (item.status === STATUS.REQUESTED || item.status === STATUS.BOUGHT)), [items, viewMonth]);

      if (loading) return <div className="min-h-screen flex items-center justify-center bg-gray-50 text-emerald-600 font-medium">Memuat data aplikasi...</div>;
      
      return (
        <div className="min-h-screen bg-gray-100 max-w-md mx-auto shadow-xl flex flex-col relative overflow-hidden font-sans">
          
          {/* Modal Error Dinamis */}
          {globalError && (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl p-6 max-w-sm w-full shadow-2xl border-t-4 border-red-500">
                <div className="text-center mb-4">
                  <IconXCircle className="w-12 h-12 text-red-500 mx-auto mb-2" />
                  <h3 className="text-lg font-bold text-gray-800">Informasi Sistem</h3>
                </div>
                <div className="bg-red-50 p-3 rounded text-sm text-red-800 mb-6 border border-red-100">
                  {globalError}
                </div>
                <button 
                  onClick={() => setGlobalError(null)} 
                  className="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 rounded-lg transition"
                >
                  Tutup Pesan
                </button>
              </div>
            </div>
          )}

          <header className="bg-emerald-600 text-white p-4 shadow-md z-10">
            <div className="flex justify-between items-center mb-4">
              <div>
                <h1 className="text-xl font-bold flex items-center gap-2">
                  <IconShoppingBag className="w-6 h-6" /> KeranjangKita
                </h1>
                <div className="flex items-center gap-2 mt-1">
                  <p className="text-emerald-100 text-sm">Periode:</p>
                  <div className="flex gap-1">
                    <select value={selectedMonth} onChange={(e) => setSelectedMonth(e.target.value)} className="bg-emerald-700 text-white text-sm border border-emerald-500 rounded p-1 outline-none cursor-pointer focus:ring-1 focus:ring-white">
                      {MONTHS.map(m => <option key={m.value} value={m.value}>{m.label}</option>)}
                    </select>
                    <select value={selectedYear} onChange={(e) => setSelectedYear(e.target.value)} className="bg-emerald-700 text-white text-sm border border-emerald-500 rounded p-1 outline-none cursor-pointer focus:ring-1 focus:ring-white">
                      {YEARS.map(y => <option key={y} value={y}>{y}</option>)}
                    </select>
                  </div>
                </div>
              </div>
              <div className="flex bg-emerald-700 rounded-lg p-1">
                <button onClick={() => setRole('IBU')} className={`px-3 py-1 rounded-md text-sm font-medium transition-colors ${role === 'IBU' ? 'bg-white text-emerald-700 shadow' : 'text-emerald-100'}`}>IBU</button>
                <button onClick={() => setRole('ART')} className={`px-3 py-1 rounded-md text-sm font-medium transition-colors ${role === 'ART' ? 'bg-white text-emerald-700 shadow' : 'text-emerald-100'}`}>ART</button>
              </div>
            </div>

            <div className="flex space-x-2 overflow-x-auto" style={{scrollbarWidth: 'none', msOverflowStyle: 'none'}}>
              <button onClick={() => setActiveTab('AKTIF')} className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-colors ${activeTab === 'AKTIF' ? 'bg-white text-emerald-600' : 'bg-emerald-500 text-white border border-emerald-400'}`}>Daftar Aktif</button>
              <button onClick={() => setActiveTab('SELESAI')} className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-colors ${activeTab === 'SELESAI' ? 'bg-white text-emerald-600' : 'bg-emerald-500 text-white border border-emerald-400'}`}>Riwayat Selesai</button>
              <button onClick={() => setActiveTab('TUTUP_BULAN')} className={`flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium transition-colors flex items-center gap-1 ${activeTab === 'TUTUP_BULAN' ? 'bg-white text-red-600' : 'bg-emerald-500 text-white border border-emerald-400'}`}>
                <IconArchive className="w-4 h-4" /> Tutup Bulan
              </button>
            </div>
          </header>

          <main className="flex-1 overflow-y-auto p-4 bg-gray-50 pb-24">
            
            {activeTab === 'AKTIF' && (
              <div className="space-y-6">
                {role === 'ART' && (
                  <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <h2 className="font-semibold text-gray-800 mb-3 flex items-center gap-2"><IconPlusCircle className="w-5 h-5 text-emerald-500"/> Tambah Kebutuhan</h2>
                    <form onSubmit={handleAddItem} className="space-y-3">
                      <div>
                        <label className="text-xs text-gray-500 mb-1 block">Nama Barang</label>
                        <input type="text" list="common-items" required value={newItemName} onChange={(e) => setNewItemName(e.target.value)} placeholder="Cth: Beras (Pilih / Ketik Sendiri)" className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-emerald-500 outline-none bg-white"/>
                        <datalist id="common-items">{COMMON_ITEMS.map(item => <option key={item} value={item} />)}</datalist>
                      </div>
                      <div className="flex gap-3">
                        <div className="w-1/3">
                          <label className="text-xs text-gray-500 mb-1 block">Jumlah</label>
                          <input type="text" required value={newItemQty} onChange={(e) => setNewItemQty(e.target.value)} placeholder="Cth: 5 Kg" className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-emerald-500 outline-none"/>
                        </div>
                        <div className="w-2/3">
                          <label className="text-xs text-gray-500 mb-1 block">Kategori</label>
                          <select value={newItemCat} onChange={(e) => setNewItemCat(e.target.value)} className="w-full border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-emerald-500 outline-none bg-white">
                            {CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                          </select>
                        </div>
                      </div>
                      <button type="submit" className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 rounded-lg transition-colors">Kirim ke Daftar Ibu</button>
                    </form>
                  </div>
                )}

                <div>
                  <h2 className="font-semibold text-gray-800 mb-3 ml-1">Daftar Belanja Bulan Ini</h2>
                  {activeItems.length === 0 ? (
                    <div className="text-center py-10 bg-white rounded-xl border border-dashed border-gray-300">
                      <IconShoppingBag className="w-10 h-10 text-gray-300 mx-auto mb-2" />
                      <p className="text-gray-500 text-sm">Belum ada barang di daftar aktif.</p>
                    </div>
                  ) : (
                    <div className="space-y-3">
                      {CATEGORIES.map(category => {
                        const categoryItems = activeItems.filter(item => item.category === category);
                        if (categoryItems.length === 0) return null;
                        return (
                          <div key={category} className="mb-4">
                            <h3 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">{category}</h3>
                            <div className="space-y-2">
                              {categoryItems.map(item => (
                                <div key={item.id} className="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                                  <div className="flex-1">
                                    <div className="flex items-center gap-2 mb-1">
                                      <h4 className="font-medium text-gray-800">{item.name}</h4>
                                      <span className="bg-gray-100 text-gray-600 text-xs px-2 py-0.5 rounded-md font-medium">{item.quantity}</span>
                                    </div>
                                    {item.status === STATUS.REQUESTED && <div className="flex items-center text-xs text-orange-500 font-medium bg-orange-50 w-max px-2 py-1 rounded"><IconClock className="w-3 h-3 mr-1" /> Menunggu Dibelikan</div>}
                                    {item.status === STATUS.BOUGHT && <div className="flex items-center text-xs text-blue-500 font-medium bg-blue-50 w-max px-2 py-1 rounded"><IconCheckCircle2 className="w-3 h-3 mr-1" /> Sudah Dibeli (Menuju Rumah)</div>}
                                  </div>
                                  <div className="flex justify-end border-t border-gray-50 pt-2 sm:border-t-0 sm:pt-0">
                                    {role === 'IBU' && item.status === STATUS.REQUESTED && <button onClick={() => handleUpdateStatus(item.id, STATUS.BOUGHT)} className="bg-blue-600 hover:bg-blue-700 text-white text-sm px-4 py-2 rounded-lg font-medium transition flex items-center gap-1"><IconCheckCircle2 className="w-4 h-4"/> Tandai Dibeli</button>}
                                    {role === 'ART' && item.status === STATUS.BOUGHT && <button onClick={() => handleUpdateStatus(item.id, STATUS.RECEIVED)} className="bg-emerald-600 hover:bg-emerald-700 text-white text-sm px-4 py-2 rounded-lg font-medium transition flex items-center gap-1"><IconCheckCircle2 className="w-4 h-4"/> Terima Barang</button>}
                                    {role === 'ART' && item.status === STATUS.REQUESTED && <button onClick={() => handleDeleteItem(item.id)} className="text-red-400 hover:text-red-600 text-sm p-2 transition"><IconXCircle className="w-5 h-5"/></button>}
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              </div>
            )}

            {activeTab === 'SELESAI' && (
              <div className="space-y-4">
                <h2 className="font-semibold text-gray-800 mb-3 ml-1">Riwayat Barang Selesai (Bulan Ini)</h2>
                {completedItems.length === 0 ? (
                  <div className="text-center py-10 bg-white rounded-xl border border-dashed border-gray-300">
                    <IconArchive className="w-10 h-10 text-gray-300 mx-auto mb-2" />
                    <p className="text-gray-500 text-sm">Belum ada barang yang selesai/diterima.</p>
                  </div>
                ) : (
                  <div className="space-y-2">
                    {completedItems.map(item => (
                      <div key={item.id} className="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between opacity-80">
                        <div>
                          <h4 className={`font-medium ${item.status === STATUS.CANCELLED ? 'text-gray-500 line-through' : 'text-gray-800'}`}>{item.name}</h4>
                          <div className="flex items-center gap-2 mt-1">
                            <span className="text-gray-500 text-xs">{item.quantity}</span><span className="text-gray-300 text-xs">•</span><span className="text-gray-500 text-xs">{item.category}</span>
                          </div>
                        </div>
                        <div>
                          {item.status === STATUS.RECEIVED ? <span className="text-xs font-medium text-emerald-600 bg-emerald-50 px-2 py-1 rounded-full flex items-center gap-1"><IconCheckCircle2 className="w-3 h-3"/> Diterima</span> : <span className="text-xs font-medium text-red-600 bg-red-50 px-2 py-1 rounded-full flex items-center gap-1"><IconXCircle className="w-3 h-3"/> Dibatalkan</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {activeTab === 'TUTUP_BULAN' && (
              <div className="space-y-4">
                <div className="bg-orange-50 border border-orange-200 rounded-xl p-4 text-orange-800">
                  <h2 className="font-bold flex items-center gap-2 mb-2"><IconAlertCircle className="w-5 h-5"/> Evaluasi Akhir Bulan</h2>
                  <p className="text-sm">Berikut adalah barang-barang yang belum berstatus "Diterima" hingga saat ini. Anda dapat memindahkannya ke daftar bulan depan atau membatalkannya.</p>
                </div>
                {cutoffPendingItems.length === 0 ? (
                  <div className="text-center py-10 bg-white rounded-xl border border-dashed border-gray-300">
                    <IconCheckCircle2 className="w-10 h-10 text-emerald-400 mx-auto mb-2" />
                    <p className="text-gray-500 text-sm">Semua daftar belanja sudah selesai!<br/>Tidak ada barang yang menggantung.</p>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {cutoffPendingItems.map(item => (
                      <div key={item.id} className="bg-white p-4 rounded-xl shadow-sm border border-orange-100">
                        <div className="flex justify-between items-start mb-3">
                          <div>
                            <h4 className="font-semibold text-gray-800">{item.name}</h4>
                            <p className="text-xs text-gray-500 mt-1">Jumlah: {item.quantity} • Bulan: {item.month}</p>
                          </div>
                          <span className={`text-xs px-2 py-1 rounded font-medium ${item.status === STATUS.BOUGHT ? 'bg-blue-100 text-blue-700' : 'bg-orange-100 text-orange-700'}`}>
                            {item.status === STATUS.BOUGHT ? 'Sudah Dibeli' : 'Belum Dibeli'}
                          </span>
                        </div>
                        <div className="grid grid-cols-2 gap-2 mt-3">
                          <button onClick={() => handleUpdateStatus(item.id, STATUS.CANCELLED)} className="flex items-center justify-center gap-1 py-2 text-sm font-medium text-red-600 bg-red-50 hover:bg-red-100 rounded-lg transition"><IconXCircle className="w-4 h-4"/> Batalkan</button>
                          <button onClick={() => handleMoveToNextMonth(item)} className="flex items-center justify-center gap-1 py-2 text-sm font-medium text-emerald-600 bg-emerald-50 hover:bg-emerald-100 rounded-lg transition"><IconRefreshCw className="w-4 h-4"/> Pindah ke Bulan Depan</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
